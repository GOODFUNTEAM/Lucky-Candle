<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>燭籤 Lucky Candle | 孤芳小隊</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="global-container">
        <div id="stage-init" class="stage active">
            <img src="candle_full.png" alt="燭籤" class="full-candle" onclick="startAnimation()">
            <p class="hint">點擊燭籤，開啟願望</p>
        </div>

        <div id="stage-main" class="stage hidden">
            <div class="carousel-container">
                <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
                
                <div id="download-zone" class="carousel-window">
                    <div id="slips-slider" class="slips-slider">
                        </div>
                </div>

                <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>
            </div>

            <div class="bottom-actions">
                <button id="btn-wish-trigger" class="btn-main hidden-element" onclick="showInputOverlay()">許下願望</button>
                <div class="flex-btns">
                    <button onclick="downloadShot()" class="btn-secondary">儲存此籤</button>
                    <button onclick="goToFinish()" class="btn-secondary">送出願望</button>
                </div>
            </div>

            <div id="input-overlay" class="overlay hidden">
                <div class="input-box">
                    <h3>最後一個願望，留給自己</h3>
                    <textarea id="custom-wish" placeholder="輸入你的願望..."></textarea>
                    <button onclick="confirmCustomWish()" class="btn-confirm">確定</button>
                </div>
            </div>
        </div>

        <div id="stage-finish" class="stage hidden">
            <img src="logo.png" alt="孤芳小隊" class="finish-logo">
            <h2 class="finish-text">孤芳小隊 祝您心想事成</h2>
            <button onclick="resetAll()" class="btn-again">再來一次</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
