<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>燭籤 Lucky Candle | 孤芳小隊</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="global-container">
        
        <div id="stage-init" class="stage active">
            <div id="marquee-container" class="marquee-wrapper">
                <div class="marquee-content">您即將獲得兩個祝福及一個許願機會，請記得在籤紙上許下願望！</div>
            </div>
            
            <div class="candle-wrapper">
                <div class="candle-container" id="candle-target">
                    <img src="candle_off.png" alt="未開啟" class="candle-img" id="img-off">
                    <img src="candle_on.png" alt="開啟" class="candle-img hidden-img" id="img-on">
                </div>
                <p class="hint" id="touch-hint">按住蠟燭三秒，凝聚願望</p>
            </div>
        </div>

        <div id="stage-main" class="stage hidden">
            <div class="carousel-area">
                <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
                <div id="download-zone" class="carousel-window">
                    <div id="slips-slider" class="slips-slider"></div>
                </div>
                <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>
            </div>

            <div class="bottom-actions">
                <div id="wish-btn-container" class="btn-wish-wrapper hidden-element">
                    <button class="btn-wish-effect" onclick="showInputOverlay()">許下願望</button>
                </div>
                <div class="flex-btns">
                    <button onclick="downloadShot()" class="btn-secondary">儲存此籤</button>
                    <button onclick="goToFinish()" class="btn-secondary">送出願望</button>
                </div>
            </div>

            <div id="input-overlay" class="overlay hidden">
                <div class="input-box">
                    <h3>最後一個願望，留給自己</h3>
                    <textarea id="custom-wish" placeholder="輸入你的願望..."></textarea>
                    <button onclick="confirmCustomWish()" class="btn-confirm">確定</button>
                </div>
            </div>
        </div>

        <div id="stage-finish" class="stage hidden">
            <img src="logo.png" alt="孤芳小隊" class="finish-logo">
            <h2 class="finish-text">孤芳小隊 祝您心想事成</h2>
            <div class="finish-btns">
                <button onclick="resetAll()" class="btn-again">再來一次</button>
                <a href="https://www.instagram.com/goodfun.team" target="_blank" class="btn-more">More...</a>
            </div>
        </div>

        <footer class="footer-copyright">
            © 2026 GOODFUN TEAM. All Rights Reserved.
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
